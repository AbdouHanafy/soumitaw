name: SoumiTaw Azure Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: ${{ vars.ACR_NAME || 'acrcloudshopabdou' }}
  RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP || 'rg-cloudshop-dev' }}
  CONTAINER_APP_ENVIRONMENT: ${{ vars.CONTAINER_APP_ENVIRONMENT || 'cae-cloudshop-dev' }}
  BACKEND_APP_NAME: ${{ vars.BACKEND_APP_NAME || 'ca-backend' }}
  FRONTEND_APP_NAME: ${{ vars.FRONTEND_APP_NAME || 'ca-frontend' }}
  POSTGRES_SERVER_NAME: ${{ vars.POSTGRES_SERVER_NAME || 'psql-cloudshop-dev-frc' }}
  POSTGRES_ADMIN_USERNAME: ${{ vars.POSTGRES_ADMIN_USERNAME || 'cloudshopadmin' }}
  DATABASE_NAME: ${{ vars.DATABASE_NAME || 'soumitaw' }}
  AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  validate:
    name: Validate Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Check backend syntax
        run: python -m compileall backend/app

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000

      - name: Build backend production image
        run: docker build -f backend/Dockerfile.prod -t soumitaw-backend:test backend

      - name: Build frontend production image
        run: docker build -f frontend/Dockerfile.prod --build-arg VITE_API_BASE_URL=http://localhost:8000 -t soumitaw-frontend:test frontend

  deploy-backend:
    name: Deploy Backend To Azure Container Apps
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    outputs:
      backend_url: ${{ steps.discover.outputs.backend_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        env:
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          if [ -z "$POSTGRES_ADMIN_PASSWORD" ]; then
            echo "::error::POSTGRES_ADMIN_PASSWORD is required for deployment"
            exit 1
          fi

          if [ -n "$AZURE_CREDENTIALS" ]; then
            exit 0
          fi

          if [ -z "$AZURE_CLIENT_ID" ] || [ -z "$AZURE_TENANT_ID" ] || [ -z "$AZURE_SUBSCRIPTION_ID" ]; then
            echo "::error::Set AZURE_CREDENTIALS or configure AZURE_CLIENT_ID, AZURE_TENANT_ID, and AZURE_SUBSCRIPTION_ID for OIDC login"
            exit 1
          fi

      - name: Login to Azure with service principal secret
        if: ${{ secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure with OIDC
        if: ${{ secrets.AZURE_CREDENTIALS == '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Resolve ACR credentials
        id: acr
        run: |
          echo "login_server=$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)" >> "$GITHUB_OUTPUT"
          echo "username=$(az acr credential show --name "$ACR_NAME" --query username -o tsv)" >> "$GITHUB_OUTPUT"
          echo "password=$(az acr credential show --name "$ACR_NAME" --query passwords[0].value -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Ensure application database exists
        run: |
          az postgres flexible-server db create \
            --resource-group "$RESOURCE_GROUP" \
            --server-name "$POSTGRES_SERVER_NAME" \
            --database-name "$DATABASE_NAME"

      - name: Resolve PostgreSQL host
        id: pg
        run: |
          echo "postgres_host=$(az postgres flexible-server show --resource-group "$RESOURCE_GROUP" --name "$POSTGRES_SERVER_NAME" --query fullyQualifiedDomainName -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Build database URL
        id: db
        env:
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
        run: |
          echo "database_url=postgresql://${POSTGRES_ADMIN_USERNAME}:${POSTGRES_ADMIN_PASSWORD}@${{ steps.pg.outputs.postgres_host }}/${DATABASE_NAME}?sslmode=require" >> "$GITHUB_OUTPUT"

      - name: Build and push backend image
        run: |
          docker build \
            -f backend/Dockerfile.prod \
            -t ${{ steps.acr.outputs.login_server }}/soumitaw-backend:${{ github.sha }} \
            -t ${{ steps.acr.outputs.login_server }}/soumitaw-backend:latest \
            backend

          docker push ${{ steps.acr.outputs.login_server }}/soumitaw-backend:${{ github.sha }}
          docker push ${{ steps.acr.outputs.login_server }}/soumitaw-backend:latest

      - name: Store backend secret
        run: |
          az containerapp secret set \
            --name "$BACKEND_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --secrets database-url="${{ steps.db.outputs.database_url }}"

      - name: Deploy backend
        run: |
          if az containerapp show --name "$BACKEND_APP_NAME" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
            az containerapp registry set \
              --name "$BACKEND_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --server "${{ steps.acr.outputs.login_server }}" \
              --username "${{ steps.acr.outputs.username }}" \
              --password "${{ steps.acr.outputs.password }}"

            az containerapp update \
              --name "$BACKEND_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --image "${{ steps.acr.outputs.login_server }}/soumitaw-backend:${{ github.sha }}" \
              --set-env-vars \
                DATABASE_URL=secretref:database-url \
                CORS_ORIGINS=https://placeholder.local \
                ENVIRONMENT=production
          else
            az containerapp create \
              --name "$BACKEND_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --environment "$CONTAINER_APP_ENVIRONMENT" \
              --image "${{ steps.acr.outputs.login_server }}/soumitaw-backend:${{ github.sha }}" \
              --ingress external \
              --target-port 8000 \
              --registry-server "${{ steps.acr.outputs.login_server }}" \
              --registry-username "${{ steps.acr.outputs.username }}" \
              --registry-password "${{ steps.acr.outputs.password }}" \
              --secrets database-url="${{ steps.db.outputs.database_url }}" \
              --env-vars \
                DATABASE_URL=secretref:database-url \
                CORS_ORIGINS=https://placeholder.local \
                ENVIRONMENT=production
          fi

      - name: Discover backend URL
        id: discover
        run: |
          echo "backend_url=https://$(az containerapp show --name "$BACKEND_APP_NAME" --resource-group "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    name: Deploy Frontend To Azure Container Apps
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    outputs:
      frontend_url: ${{ steps.discover.outputs.frontend_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure with service principal secret
        if: ${{ secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure with OIDC
        if: ${{ secrets.AZURE_CREDENTIALS == '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name "$ACR_NAME"

      - name: Resolve ACR credentials
        id: acr
        run: |
          echo "login_server=$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)" >> "$GITHUB_OUTPUT"
          echo "username=$(az acr credential show --name "$ACR_NAME" --query username -o tsv)" >> "$GITHUB_OUTPUT"
          echo "password=$(az acr credential show --name "$ACR_NAME" --query passwords[0].value -o tsv)" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend image
        run: |
          docker build \
            -f frontend/Dockerfile.prod \
            --build-arg VITE_API_BASE_URL=${{ needs.deploy-backend.outputs.backend_url }} \
            -t ${{ steps.acr.outputs.login_server }}/soumitaw-frontend:${{ github.sha }} \
            -t ${{ steps.acr.outputs.login_server }}/soumitaw-frontend:latest \
            frontend

          docker push ${{ steps.acr.outputs.login_server }}/soumitaw-frontend:${{ github.sha }}
          docker push ${{ steps.acr.outputs.login_server }}/soumitaw-frontend:latest

      - name: Deploy frontend
        run: |
          if az containerapp show --name "$FRONTEND_APP_NAME" --resource-group "$RESOURCE_GROUP" >/dev/null 2>&1; then
            az containerapp registry set \
              --name "$FRONTEND_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --server "${{ steps.acr.outputs.login_server }}" \
              --username "${{ steps.acr.outputs.username }}" \
              --password "${{ steps.acr.outputs.password }}"

            az containerapp update \
              --name "$FRONTEND_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --image "${{ steps.acr.outputs.login_server }}/soumitaw-frontend:${{ github.sha }}"
          else
            az containerapp create \
              --name "$FRONTEND_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --environment "$CONTAINER_APP_ENVIRONMENT" \
              --image "${{ steps.acr.outputs.login_server }}/soumitaw-frontend:${{ github.sha }}" \
              --ingress external \
              --target-port 8080 \
              --registry-server "${{ steps.acr.outputs.login_server }}" \
              --registry-username "${{ steps.acr.outputs.username }}" \
              --registry-password "${{ steps.acr.outputs.password }}"
          fi

      - name: Discover frontend URL
        id: discover
        run: |
          echo "frontend_url=https://$(az containerapp show --name "$FRONTEND_APP_NAME" --resource-group "$RESOURCE_GROUP" --query properties.configuration.ingress.fqdn -o tsv)" >> "$GITHUB_OUTPUT"

  finalize:
    name: Finalize CORS
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    steps:
      - name: Login to Azure with service principal secret
        if: ${{ secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to Azure with OIDC
        if: ${{ secrets.AZURE_CREDENTIALS == '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Set backend frontend origin
        run: |
          az containerapp update \
            --name "$BACKEND_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --set-env-vars \
              DATABASE_URL=secretref:database-url \
              CORS_ORIGINS=${{ needs.deploy-frontend.outputs.frontend_url }} \
              ENVIRONMENT=production
