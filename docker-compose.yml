services:
  postgres:
    image: postgres:16-alpine
    container_name: soumitaw-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-soumitaw}
      POSTGRES_USER: ${POSTGRES_USER:-soumitaw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soumitaw}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soumitaw} -d ${POSTGRES_DB:-soumitaw}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: soumitaw-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://soumitaw:soumitaw@postgres:5432/soumitaw}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: soumitaw-frontend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  frontend_node_modules:
